name: Deploy Changed Files via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Changed Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Get changed files
        id: changed-files
        run: |
          echo "Detecting changed files..."
          git diff --name-only HEAD^ HEAD > changed_files.txt
          cat changed_files.txt

      - name: Upload changed files via SFTP
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          echo "Uploading changed files..."

          while IFS= read -r file
          do
            if [ -f "$file" ]; then
              echo "Uploading $file"

              lftp -u "$SFTP_USERNAME","$SFTP_PASSWORD" sftp://"$SFTP_HOST" -e "
              set sftp:auto-confirm yes
              mkdir -p $SFTP_REMOTE_DIR/$(dirname "$file");
              put $file -o $SFTP_REMOTE_DIR/$file;
              bye"
            fi
          done < changed_files.txt

          